apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mounts
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  application: my-app
          - git:
              repoURL: https://github.com/highonsemicolon/pathfinder
              revision: main
              directories:
                - path: argocd/applications/my-app/mounts/*
  template:
    metadata:
      name: '{{metadata.labels.application}}-mounts-{{path[4]}}-{{metadata.labels.environment}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/highonsemicolon/pathfinder
        targetRevision: main
        path: '{{path}}'
      destination:
        server: '{{server}}'
        namespace: '{{path[4]}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true