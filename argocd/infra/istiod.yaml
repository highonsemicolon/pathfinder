apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: istiod
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            application: my-app
  template:
    metadata:
      name: 'my-app-istiod-{{metadata.labels.environment}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-2"
    spec:
      project: default
      source:
        repoURL: https://istio-release.storage.googleapis.com/charts
        chart: istiod
        targetRevision: 1.30.0
        helm:
          values: |
            pilot:
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
            global:
              proxy:
                autoInject: disabled
      destination:
        server: '{{server}}'
        namespace: istio-system
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          name: istio-validator-istio-system
          jsonPointers:
            - /webhooks/0/clientConfig/caBundle
            - /webhooks/0/failurePolicy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true