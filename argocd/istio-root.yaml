apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: istio-root
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            application: my-app
  template:
    metadata:
      name: 'my-app-istio-root-{{metadata.labels.environment}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      source:
        repoURL: https://github.com/highonsemicolon/pathfinder
        targetRevision: main
        path: argocd/infra
      destination:
        server: '{{server}}'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true