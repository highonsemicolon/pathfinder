name: Publish Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"
      - ".github/workflows/publish-helm.yaml"
      - "README.md"

concurrency:
  group: helm-publish
  cancel-in-progress: false
  
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint helm

      - name: Package Helm chart
        run: |
          mkdir -p .deploy
          helm package helm --destination .deploy

      - name: Generate index.yaml
        run: |
          cp gh-pages/index.yaml .deploy/index.yaml 2>/dev/null || true
          helm repo index .deploy \
            --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} \
            --merge .deploy/index.yaml

      - name: Copy README to deploy directory
        run: cp README.md .deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .deploy
          publish_branch: gh-pages
          enable_jekyll: true
