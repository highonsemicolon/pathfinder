{{- if .Values.pdb.enabled }}
{{- if and (hasKey .Values.pdb "minAvailable") (hasKey .Values.pdb "maxUnavailable") }}
{{- fail "pdb: minAvailable and maxUnavailable are mutually exclusive, use one or the other" }}
{{- end }}
{{- if and (eq (int .Values.replicaCount) 1) (hasKey .Values.pdb "minAvailable") }}
{{- if eq (int .Values.pdb.minAvailable) 1 }}
{{- fail "pdb: minAvailable: 1 with replicaCount: 1 will block node drains. Increase replicaCount or set maxUnavailable: 1 instead" }}
{{- end }}
{{- end }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "pathfinder.fullname" . }}
  labels:
    {{- include "pathfinder.labels" . | nindent 4 }}
spec:
  {{- if hasKey .Values.pdb "maxUnavailable" }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.pdb.minAvailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pathfinder.selectorLabels" . | nindent 6 }}
{{- end }}
